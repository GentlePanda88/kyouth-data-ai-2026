services:

  frontend:
    image: frontend
    pull_policy: build
    build:
      context: frontend
      dockerfile: Dockerfile
    ports:
      - "80:8000"
    environment:
      - BACKEND_URL=http://localhost:8001
      - DB_PATH=/app/jobs.db
    networks:
      - app-network
    depends_on:
      - backend

  backend:
    image: backend
    pull_policy: build
    build:
      context: backend
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
